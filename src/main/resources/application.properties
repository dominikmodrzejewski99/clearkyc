spring.application.name=clearkyc
spring.profiles.active=dev
server.port=8081
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
# Disable Spring Boot default /** resource handler so our SPA PathResourceResolver is the only one
spring.web.resources.add-mappings=false
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:http://dev-placeholder.invalid}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/clearkyc}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:clearkyc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:clearkyc}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.locations=classpath:db/migration

spring.ai.google.genai.api-key=${GOOGLE_GENAI_API_KEY}
# gemini-2.5-pro requires a billed Google Cloud project; the demo key is free-tier only,
# so every extraction call failed with a generic "Failed to generate content" error.
# gemini-3.1-flash-lite is free-tier-eligible and is what application-dev.properties already uses.
spring.ai.google.genai.chat.model=gemini-3.1-flash-lite
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
spring.web.encoding.charset=UTF-8
spring.web.encoding.force=true
