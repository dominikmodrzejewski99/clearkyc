spring.application.name=clearkyc
server.port=8081
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
# Disable Spring Boot default /** resource handler so our SPA PathResourceResolver is the only one
spring.web.resources.add-mappings=false
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clearkyc}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:clearkyc}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:clearkyc}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration
