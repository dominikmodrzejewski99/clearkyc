pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      exclude: "web/**"
      run: npx eslint --fix {staged_files} && git add {staged_files}
    typecheck:
      # TypeScript lives in web/ (Angular project); run tsc there
      run: cd web && npx tsc --noEmit
    test:
      glob: "*.{ts,tsx}"
      exclude: "web/**"
      run: npx vitest related {staged_files} --run
    web-test:
      # Angular spec files require @angular/build:unit-test; run ng test
      glob: "web/src/**/*.spec.ts"
      run: cd web && ng test --no-watch