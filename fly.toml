# fly.toml — ClearKYC smoke deploy
# See https://fly.io/docs/reference/configuration/

app = "clearkyc"
primary_region = "fra"

[build]
  builder = "paketobuildpacks/builder-jammy-base"
  [build.args]
    BP_JVM_VERSION = "21"

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  SERVER_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/actuator/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
