@if (caseStore.pdfBlob() === null && caseStore.caseStatus() !== 'LOCKED') {
  <div class="re-upload-banner">
    <p class="re-upload-banner__text">
      Plik PDF nie jest dostępny po odświeżeniu strony. Wgraj go ponownie, aby kontynuować.
    </p>
    <label class="re-upload-banner__label">
      Wybierz plik PDF
      <input
        type="file"
        accept=".pdf"
        class="re-upload-banner__input"
        (change)="onReUpload($event)"
      />
    </label>
  </div>
}

<div class="case-detail-wrap">
  <app-workstation-topbar
    [entityName]="caseStore.entityName()"
    [caseId]="caseStore.caseId()"
    [runState]="runState()"
  />
  <app-layout>
    <div slot="pdf" class="pdf-pane-inner">
      <app-pdf-viewer
        [pdfBlob]="caseStore.pdfBlob()"
        [targetPage]="caseStore.activePage()"
        [activeQuote]="caseStore.activeQuote()"
      />
      <app-snippet-panel />
    </div>
    <div slot="form" class="form-pane">
      <app-extraction-form />
      <app-red-flag-list />
      <app-decision-bar />
    </div>
  </app-layout>
</div>
