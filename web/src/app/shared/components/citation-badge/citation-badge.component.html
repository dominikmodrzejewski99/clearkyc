<button
  class="cite-sup"
  type="button"
  (click)="navigate()"
  [title]="'Kliknij → str. ' + citation().page + ' w PDF · ' + citation().quote.slice(0, 60) + (citation().quote.length > 60 ? '…' : '')"
  [attr.aria-label]="'Cytat ' + index() + ': przejdź do str. ' + citation().page + ' w PDF'"
>[{{ index() }}]</button>
