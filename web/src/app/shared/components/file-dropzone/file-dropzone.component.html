<div
  class="drop-zone"
  [class.drag-over]="isDragOver()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
>
  <input
    #fileInput
    type="file"
    accept=".pdf"
    class="dz-input"
    (change)="onFileChange($event)"
  />
  <div class="dz-icon">⬆</div>
  <div class="dz-label">Drag and drop your document here</div>
  <div class="dz-hint">or <b (click)="$event.stopPropagation(); fileInput.click()">browse files</b> to select</div>
  <div class="dz-formats">PDF · max 50 MB</div>
  @if (error()) {
    <p class="dz-error">{{ error() }}</p>
  }
</div>
