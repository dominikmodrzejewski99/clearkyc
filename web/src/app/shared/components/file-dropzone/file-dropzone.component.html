<div
  class="drop-zone"
  [class.drag-over]="isDragOver()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
>
  <input
    #fileInput
    type="file"
    accept=".pdf"
    class="dz-input"
    (change)="onFileChange($event)"
  />
  <div class="dz-icon">⬆</div>
  <div class="dz-label">Przeciągnij i upuść dokument tutaj</div>
  <div class="dz-hint">lub <b (click)="$event.stopPropagation(); fileInput.click()">przeglądaj pliki</b> aby wybrać</div>
  <div class="dz-formats">PDF · max 50 MB</div>
  @if (error()) {
    <p class="dz-error">{{ error() }}</p>
  }
</div>
