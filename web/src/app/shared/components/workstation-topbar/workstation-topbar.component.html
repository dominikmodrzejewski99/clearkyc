<header class="topbar">
  <div class="tb-left">
    <a class="tb-back" routerLink="/" aria-label="Wróć do listy spraw">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Sprawy
    </a>
    <div class="tb-divider"></div>
    <div class="brand-mark">CK</div>
    <div class="tb-doc">
      <div class="tb-entity">{{ entityName() ?? caseId() }}</div>
      <div class="tb-meta">
        <span class="mono">{{ caseId() }}</span>
      </div>
    </div>
  </div>
  <div class="tb-right">
    <span
      class="run-state"
      [class.running]="runState() === 'running'"
      [class.complete]="runState() === 'complete'"
    >
      <span class="rs-dot"></span>
      @if (runState() === 'idle') { Oczekuje na analizę }
      @else if (runState() === 'running') { Analizowanie… }
      @else { Ekstrakcja zakończona }
    </span>
  </div>
</header>
