<div class="app-layout" [style]="layoutStyle()">
  <div class="app-layout__pane app-layout__pane--pdf">
    <ng-content select="[slot='pdf']" />
  </div>

  <div class="app-layout__resizer" (mousedown)="onResizerMouseDown($event)"></div>

  <div class="app-layout__pane app-layout__pane--form">
    <ng-content select="[slot='form']" />
  </div>
</div>
